                    double: ['doppiu', 'doppiu', 'doppiu', 'double', 'doppio', 'double'],
                    increaseFont: ['Tipugrafia: più maiore', 'Tipugrafia: più maiori', 'Tipugrafia: più maiori', 'Agrandir police caractères', 'Aumentare dimensione dei caratteri', 'Increase font size'],
                    decreaseFont: ['Tipugrafia: più minore', 'Tipugrafia: più minori', 'Tipugrafia: più minori', 'Réduire police caractères', 'Ridurre dimensione dei caratteri', 'Decrease font size'],
                    defaultMode: ['Modu currente', 'Modu currenti', 'Modu currenti', 'Mode par défaut', 'Modo predefinito', 'Default mode'],
                    targetLanguage: ['Lingua di destinazione', 'Lingua di distinazioni', 'Lingua di distinazioni', 'Langage-destination', 'Lingua di destinazione', 'Target language'],
                    savePreferences: ['Arrigistrà e preferenze', 'Arrighjistrà i prifarenzi', 'Arrighjistrà i prifarenzi', 'Sauvegarder préférences', 'Salva preferenze', 'Save preferences'],
                    interfaceLanguage: ["Lingua di l'interfaccia", "Lingua di l'intarfaccia", "Lingua di l'intarfaccia", "Langue de l'interface", "Lingua dell'interfaccia", 'Interface language'],
                    writingMode: ['Modu di scrittura', 'Modu di scrittura', 'Modu di scrittura', "Mode d'écriture", 'Modalità di scrittura', 'Writing mode'],

opyright notice and this permission notice shall be included in all copies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED \"AS IS\", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE."]
                };

                const lsTargetLang = ['cismuntincu', 'sartinesu', 'taravesu'];
                const lsInterfaceLang = ['cismuntincu', 'sartinesu', 'taravesu', 'français', 'italiano', 'english'];
                const lsMode = ['single', 'double', '2x2', '3x2'];
                const categories = ['all', 'animal', 'tree', 'person', 'object', 'fruit', 'vegetable'];

                // State
                let state = {
                    targetLang: CIS,
                    interfaceLang: CIS,
                    mode: 'single',
                    category1: 'all',
                    category2: 'all',
                    outputText: '',
                    fontSize: 24,
                    showAbout: false
                };

                // Helpers
                const el = (id) => document.getElementById(id);

                const getRandomCategory = () => {
                    const keys = Object.keys(dic);
                    return keys[Math.floor(Math.random() * keys.length)];
                };

                const getRandomItem = (sCategory) => {
                    sCategory = sCategory || 'all';
                    let sCat = sCategory === 'all' ? getRandomCategory() : sCategory;
                    const items = dic[sCat];
                    if (!items || items.length === 0) return ["Error", "(Error)"];
                    const randomIndex = Math.floor(Math.random() * items.length);
                    const first = items[randomIndex][state.targetLang];
                    const order = ['A', 'B'].sort(() => Math.random() - 0.5).join(',');
                    return [first, `(${order})`];
                };

                const getRandomDoubleItem = (sCategory1, sCategory2) => {
                    sCategory1 = sCategory1 || 'all';
                    sCategory2 = sCategory2 || 'all';
                    const dic1 = JSON.parse(JSON.stringify(dic));
                    let sCat1 = sCategory1 === 'all' ? getRandomCategory() : sCategory1;
                    let items1 = dic1[sCat1];
                    if (!items1) return ["Error", "Error", "(Error)"];
                    
                    const index1 = Math.floor(Math.random() * items1.length);
                    const first = items1[index1][state.targetLang];
                    items1.splice(index1, 1);

                    let sCat2 = sCategory2 === 'all' ? getRandomCategory() : sCategory2;
                    let items2 = dic1[sCat2];
                    
                    if (items2.length === 0 && sCategory2 === 'all') {
                        const otherCats = Object.keys(dic1).filter(cat => cat !== sCat2 && dic1[cat].length > 0);
                        if (otherCats.length > 0) {
                            sCat2 = otherCats[Math.floor(Math.random() * otherCats.length)];
                            items2 = dic1[sCat2];
                        }
                    }
                    const index2 = items2.length > 0 ? Math.floor(Math.random() * items2.length) : 0;
                    const second = items2.length > 0 ? items2[index2][state.targetLang] : '';
                    const order = ['A', 'B'].sort(() => Math.random() - 0.5).join(',');
                    return [first, second, `(${order})`];
                };

                const getRandom2x2Item = (sCategory) => {
                    sCategory = sCategory || 'all';
                    const dic1 = JSON.parse(JSON.stringify(dic));
                    const items = [];
                    const orders = [];

                    for (let i = 0; i < 4; i++) {
                        let sCat = sCategory === 'all' ? getRandomCategory() : sCategory;
                        const catItems = dic1[sCat];
                        if (!catItems || catItems.length === 0) continue;
                        const index = Math.floor(Math.random() * catItems.length);
                        items.push(catItems[index][state.targetLang]);
                        catItems.splice(index, 1);
                    }
                    while (items.length < 4) items.push('');
                    const letters = ['A', 'B', 'C', 'D'].sort(() => Math.random() - 0.5);
                    orders.push(`(${letters[0]},${letters[1]})`);
                    orders.push(`(${letters[2]},${letters[3]})`);
                    return [...items, ...orders];
                };

                const getRandom3x2Item = (sCategory) => {
                    sCategory = sCategory || 'all';
                    const dic1 = JSON.parse(JSON.stringify(dic));
                    const items = [];
                    const orders = [];

                    for (let i = 0; i < 6; i++) {
                        let sCat = sCategory === 'all' ? getRandomCategory() : sCategory;
                        const catItems = dic1[sCat];
                        if (!catItems || catItems.length === 0) continue;
                        const index = Math.floor(Math.random() * catItems.length);
                        items.push(catItems[index][state.targetLang]);
                        catItems.splice(index, 1);
                    }
                    while (items.length < 6) items.push('');
                    const letters = ['A', 'B', 'C', 'D', 'E', 'F'].sort(() => Math.random() - 0.5);
                    orders.push(`(${letters[0]},${letters[1]})`);
                    orders.push(`(${letters[2]},${letters[3]})`);
                    orders.push(`(${letters[4]},${letters[5]})`);
                    return [...items, ...orders];
                };

                const generateTheme = () => {
                    try {
                        let result = '';
                        if (state.mode === 'single') {
                            const [first, order] = getRandomItem(state.category1);
                            result = `${first} ${order}`;
                        } else if (state.mode === 'double') {
                            const [first, second, order] = getRandomDoubleItem(state.category1, state.category2);
                            result = `${first}\nè\n${second} ${order}`;
                        } else if (state.mode === '2x2') {
                            const res = getRandom2x2Item(state.category1);
                            result = `${res[0]}\nè\n${res[1]} ${res[4]}\n${res[2]}\nè\n${res[3]} ${res[5]}`;
                        } else if (state.mode === '3x2') {
                            const res = getRandom3x2Item(state.category1);
                            result = `${res[0]}\nè\n${res[1]} ${res[6]}\n${res[2]}\nè\n${res[3]} ${res[7]}\n${res[4]}\nè\n${res[5]} ${res[8]}`;
                        }
                        state.outputText = result;
                        updateUI();
                    } catch (error) {
                        state.outputText = "Error: " + error.message;
                        updateUI();
                    }
                };

                const savePreferences = () => {
                    try {
                        localStorage.setItem('targetLang', state.targetLang.toString());
                        localStorage.setItem('interfaceLang', state.interfaceLang.toString());
                        localStorage.setItem('mode', state.mode);
                        localStorage.setItem('category1', state.category1);
                        localStorage.setItem('category2', state.category2);
                    } catch(e) { console.warn("Local Storage not available"); }
                };

                const loadPreferences = () => {
                    try {
                        const t = localStorage.getItem('targetLang');
                        const i = localStorage.getItem('interfaceLang');
                        const m = localStorage.getItem('mode');
                        const c1 = localStorage.getItem('category1');
                        const c2 = localStorage.getItem('category2');
                        if (t !== null) state.targetLang = parseInt(t);
                        if (i !== null) state.interfaceLang = parseInt(i);
                        if (m !== null) state.mode = m;
                        if (c1 !== null) state.category1 = c1;
                        if (c2 !== null) state.category2 = c2;
                        
                        // Safety check for bad data
                        if(isNaN(state.targetLang)) state.targetLang = CIS;
                        if(isNaN(state.interfaceLang)) state.interfaceLang = CIS;
                    } catch(e) { console.warn("Could not load preferences"); }
                };

                const updateUI = () => {
                    const lang = state.interfaceLang;
                    const setText = (id, text) => { const e = el(id); if (e) e.textContent = text; };
                    const setVal = (id, val) => { const e = el(id); if (e) e.value = val; };

                    setText('app-title', interfaceText.title[lang]);
                    setText('btn-run', interfaceText.run[lang]);
                    setText('btn-font-inc', interfaceText.increaseFont[lang]);
                    setText('btn-font-dec', interfaceText.decreaseFont[lang]);
                    setText('label-mode', interfaceText.defaultMode[lang]);
                    setText('label-cat1', interfaceText.category[lang]);
                    setText('label-cat2', interfaceText.category[lang]);
                    setText('label-target-lang', interfaceText.targetLanguage[lang]);
                    setText('label-interface-lang', interfaceText.interfaceLanguage[lang]);
                    setText('btn-about', interfaceText.about[lang]);
                    setText('modal-title', interfaceText.about[lang]);
                    setText('modal-body', interfaceText.aboutText[lang]);
                    setText('btn-close-modal', "Close");

                    const out = el('output-text');
                    if(out) { out.textContent = state.outputText; out.style.fontSize = `${state.fontSize}px`; }

                    setVal('select-mode', state.mode);
                    setVal('select-cat1', state.category1);
                    setVal('select-cat2', state.category2);
                    setVal('select-target-lang', state.targetLang);
                    setVal('select-interface-lang', state.interfaceLang);

                    const c2 = el('container-cat2');
                    if(c2) c2.className = state.mode === 'double' ? '' : 'hidden';

                    const m = el('modal-about');
                    if(m) m.className = state.showAbout ? 'modal-backdrop active' : 'modal-backdrop';
                };

                const populateSelects = () => {
                    const modeSel = el('select-mode');
                    if(modeSel) {
                        modeSel.innerHTML = '';
                        lsMode.forEach((m, i) => {
                            const opt = document.createElement('option');
                            opt.value = m;
                            opt.textContent = i < 2 ? interfaceText[m][state.interfaceLang] : m;
                            modeSel.appendChild(opt);
                        });
                    }

                    const popCat = (id) => {
                        const s = el(id);
                        if(!s) return;
                        s.innerHTML = '';
                        categories.forEach(c => {
                            const opt = document.createElement('option');
                            opt.value = c;
                            opt.textContent = interfaceText[c][state.interfaceLang];
                            s.appendChild(opt);
                        });
                    };
                    popCat('select-cat1');
                    popCat('select-cat2');

                    const tLang = el('select-target-lang');
                    if(tLang) {
                        tLang.innerHTML = '';
                        lsTargetLang.forEach((l, i) => {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.textContent = l;
                            tLang.appendChild(opt);
                        });
                    }

                    const iLang = el('select-interface-lang');
                    if(iLang) {
                        iLang.innerHTML = '';
                        lsInterfaceLang.forEach((l, i) => {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.textContent = l;
                            iLang.appendChild(opt);
                        });
                    }
                };

                const initEvents = () => {
                    const b = (id, fn) => { const e = el(id); if(e) e.addEventListener('click', fn); };
                    const c = (id, fn) => { const e = el(id); if(e) e.addEventListener('change', fn); };

                    b('btn-run', generateTheme);
                    b('btn-font-inc', () => { state.fontSize = Math.min(state.fontSize + 2, 48); updateUI(); });
                    b('btn-font-dec', () => { state.fontSize = Math.max(state.fontSize - 2, 12); updateUI(); });
                    b('btn-about', () => { state.showAbout = true; updateUI(); });
                    b('btn-close-modal', () => { state.showAbout = false; updateUI(); });

                    const modal = el('modal-about');
                    if(modal) modal.addEventListener('click', (e) => { if(e.target === modal) { state.showAbout = false; updateUI(); }});

                    c('select-mode', (e) => { state.mode = e.target.value; savePreferences(); updateUI(); });
                    c('select-cat1', (e) => { state.category1 = e.target.value; savePreferences(); updateUI(); });
                    c('select-cat2', (e) => { state.category2 = e.target.value; savePreferences(); updateUI(); });
                    c('select-target-lang', (e) => { state.targetLang = parseInt(e.target.value); savePreferences(); updateUI(); });
                    c('select-interface-lang', (e) => { state.interfaceLang = parseInt(e.target.value); populateSelects(); savePreferences(); updateUI(); });
                };

                window.addEventListener('DOMContentLoaded', () => {
                    loadPreferences();
                    populateSelects();
                    initEvents();
                    updateUI();
                    console.log("App Initialized Successfully");
                });

            } catch (e) {
                document.getElementById('error-log').style.display = 'block';
                document.getElementById('error-log').innerHTML = "Initialization Error: " + e.message;
                console.error(e);
            }
        })();
    </script>
